# Fuzzel config
# Catppuccin Mocha-ish palette + Emacs navigation keys

[main]
font=JetBrains Mono:size=14
dpi-aware=yes
prompt=Search: 
terminal=foot
layer=overlay

# Window sizing
width=45
lines=8
horizontal-pad=20
vertical-pad=16
inner-pad=10

[colors]
# Catppuccin Mocha palette
background=1e1e2eff
text=cdd6f4ff
match=cba6f7ff
selection=585b70ff
selection-text=f5e0dcff
border=cba6f7ff

[border]
width=2
radius=12

[key-bindings]
# List navigation
next=Control+n
prev=Control+p

# Optional extras
next-page=Page_Down
prev-page=Page_Up
accept=Return
cancel=Escape

